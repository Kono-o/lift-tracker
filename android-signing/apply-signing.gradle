// Applied from android/app/build.gradle for release APK signing.
// Credentials live in android-signing/keystore.properties (not committed).

def keystorePropertiesFile = rootProject.file('../android-signing/keystore.properties')
if (!keystorePropertiesFile.exists()) {
    throw new GradleException(
        'Missing android-signing/keystore.properties. Run: ./scripts/setup-android-signing.fish'
    )
}

def keystoreProperties = new Properties()
keystoreProperties.load(new FileInputStream(keystorePropertiesFile))

def keystoreFile = rootProject.file("../android-signing/${keystoreProperties['storeFile']}")
if (!keystoreFile.exists()) {
    throw new GradleException(
        "Keystore not found at ${keystoreFile}. Run: ./scripts/setup-android-signing.fish"
    )
}

android.signingConfigs {
    create('release') {
        storeFile keystoreFile
        storePassword keystoreProperties['storePassword']
        keyAlias keystoreProperties['keyAlias']
        keyPassword keystoreProperties['keyPassword']
    }
}

android.buildTypes.getByName('release').signingConfig = android.signingConfigs.getByName('release')